<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>MPP Sandbox — Try the Machine Payments Protocol</title>

    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --border: #2a2a2a;
        --text: #e0e0e0;
        --muted: #888;
        --accent: #22c55e;
        --accent-dim: #166534;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Terminal container ── */
      .terminal-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .terminal-chrome {
        background: var(--surface);
        overflow: hidden;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .terminal-container {
        padding: 6px 8px;
      }

      .terminal-titlebar {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
        gap: 12px;
      }

      .terminal-dots {
        display: flex;
        gap: 6px;
      }

      .terminal-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .dot-red {
        background: #ef4444;
      }
      .dot-yellow {
        background: #eab308;
      }
      .dot-green {
        background: #22c55e;
      }

      #terminal-container {
        flex: 1;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <div class="terminal-wrapper">
      <div class="terminal-chrome">
        <div class="terminal-titlebar">
          <div class="terminal-dots">
            <span class="dot-red"></span>
            <span class="dot-yellow"></span>
            <span class="dot-green"></span>
          </div>
          <span id="termTitle">mpp-sandbox</span>
        </div>
        <div id="terminal-container"></div>
      </div>
    </div>

    <script type="module">
      import {
        FitAddon,
        init,
        Terminal
      } from "https://cdn.jsdelivr.net/npm/ghostty-web@0.4.0/dist/ghostty-web.js"

      let terminal = null
      let ws = null
      let sessionId = null

      async function launch() {
        await init()

        sessionId = crypto.randomUUID()

        terminal = new Terminal({
          cursorBlink: true,
          fontSize: 16,
          fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
          theme: {
            background: "#141414",
            foreground: "#e0e0e0",
            cursor: "#22c55e",
            selectionBackground: "#264f35",
            selectionForeground: "#ffffff"
          },
          scrollback: 5000
        })

        const container = document.getElementById("terminal-container")

        window.terminal = terminal

        const fitAddon = new FitAddon()
        terminal.loadAddon(fitAddon)

        // Clickable URLs — uses buffer API with wrapped-line joining
        const _urlRe = /(https?:\/\/[^\s<>'")\]},;]+)/g

        // Fallback: track URLs from raw output stream
        const _foundUrls = []
        function trackOutput(data) {
          const text = typeof data === "string" ? data : new TextDecoder().decode(data)
          const clean = text.replace(/\x1b(?:\[[0-9;]*[a-zA-Z]|\][^\x07]*\x07)/g, "")
          _urlRe.lastIndex = 0
          let m
          while ((m = _urlRe.exec(clean)) !== null) {
            _foundUrls.push(m[0])
          }
        }

        function findUrlAtRow(row) {
          // Read text from clicked row and neighbors via buffer API
          const rowTexts = []
          try {
            const buf = terminal.buffer.active
            if (buf?.getLine) {
              const absRow = (buf.viewportY || 0) + row
              // Read ±2 rows around click to cover wrapped URLs
              for (let r = absRow - 2; r <= absRow + 2; r++) {
                if (r < 0) continue
                const ln = buf.getLine(r)
                if (!ln) break
                const t = ln.translateToString ? ln.translateToString(true).trim() : ""
                if (t) rowTexts.push(t)
              }
            }
          } catch (_) {}

          // Check if any row text is a substring of a tracked URL
          // (handles wrapped URLs: each visual row contains a piece)
          for (const url of _foundUrls) {
            for (const text of rowTexts) {
              if (url.includes(text) || text.includes(url)) return url
              // Also check if row text overlaps with URL
              // (row may have non-URL text before/after the URL fragment)
              _urlRe.lastIndex = 0
              const m = _urlRe.exec(text)
              if (m && url.includes(m[0])) return url
            }
          }

          // Direct URL match in joined row text
          const joined = rowTexts.join("")
          _urlRe.lastIndex = 0
          const directMatch = _urlRe.exec(joined)
          if (directMatch) return directMatch[0]

          return null
        }

        function getCharHeight() {
          const canvas = container.querySelector("canvas")
          if (!canvas) return 20
          return canvas.height / window.devicePixelRatio / terminal.rows
        }

        window._foundUrls = _foundUrls
        window.findUrlAtRow = findUrlAtRow

        terminal.open(container)
        fitAddon.fit()
        fitAddon.observeResize()

        // Cmd/Ctrl+click to open URLs, hover for pointer cursor
        const termEl = container
        termEl.addEventListener("click", e => {
          if (!e.metaKey && !e.ctrlKey) return
          const rect = termEl.getBoundingClientRect()
          const y = e.clientY - rect.top
          const row = Math.floor(y / getCharHeight())
          const url = findUrlAtRow(row)
          if (url) {
            e.preventDefault()
            window.open(url, "_blank")
          }
        })
        termEl.addEventListener("mousemove", e => {
          if (!e.metaKey && !e.ctrlKey) {
            termEl.style.cursor = ""
            return
          }
          const rect = termEl.getBoundingClientRect()
          const y = e.clientY - rect.top
          const row = Math.floor(y / getCharHeight())
          const url = findUrlAtRow(row)
          termEl.style.cursor = url ? "pointer" : ""
        })

        // Fetch per-user sandbox ID
        const meRes = await fetch("/api/me")
        const { userId: sandboxId } = await meRes.json()

        // Connect WebSocket to sandbox terminal
        const proto = location.protocol === "https:" ? "wss:" : "ws:"
        const wsUrl = `${proto}//${location.host}/ws/terminal?id=${sandboxId}&session=${sessionId}&cols=${terminal.cols}&rows=${terminal.rows}`

        ws = new WebSocket(wsUrl)
        ws.binaryType = "arraybuffer"

        const encoder = new TextEncoder()

        ws.onopen = () => {
          document.getElementById("termTitle").textContent =
            `mpp-sandbox — ${sessionId.slice(0, 8)}`
        }

        ws.onmessage = event => {
          if (event.data instanceof ArrayBuffer) {
            const bytes = new Uint8Array(event.data)
            trackOutput(bytes)
            terminal.write(bytes)
            return
          }
          if (typeof event.data === "string") {
            try {
              const msg = JSON.parse(event.data)
              if (msg.type === "ready") {
                terminal.focus()
                terminal.clear()
                _foundUrls.length = 0
              } else if (msg.type === "error") {
                console.error("PTY error:", msg.message)
              } else if (msg.type === "exit") {
                terminal.write(`\r\n\x1b[33m[Process exited with code ${msg.code}]\x1b[0m\r\n`)
              }
            } catch {
              trackOutput(event.data)
              terminal.write(event.data)
            }
          }
        }

        ws.onclose = () => {
          terminal.write("\r\n\x1b[33m[Session ended. Refresh to start a new sandbox.]\x1b[0m\r\n")
        }

        ws.onerror = () => {
          terminal.write("\r\n\x1b[31m[Connection error. Check console for details.]\x1b[0m\r\n")
        }

        terminal.onData(data => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(encoder.encode(data))
          }
        })

        terminal.onResize(({ cols, rows }) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "resize", cols, rows }))
          }
        })

        // Fix: ghostty-web converts wheel events to arrow keys in alternate screen
        // mode, which causes OpenCode to navigate between messages. Instead, send
        // proper SGR mouse wheel events so the TUI handles them as scroll.
        terminal.attachCustomWheelEventHandler(event => {
          const isAltScreen = terminal.wasmTerm?.isAlternateScreen?.()
          if (!isAltScreen) return false // normal scrollback in non-TUI mode

          if (!ws || ws.readyState !== WebSocket.OPEN) return true

          if (terminal.hasMouseTracking()) {
            const canvas = container.querySelector("canvas")
            if (canvas) {
              const rect = canvas.getBoundingClientRect()
              const cellW = rect.width / terminal.cols
              const cellH = rect.height / terminal.rows
              const col = Math.max(
                1,
                Math.min(terminal.cols, Math.floor((event.clientX - rect.left) / cellW) + 1)
              )
              const row = Math.max(
                1,
                Math.min(terminal.rows, Math.floor((event.clientY - rect.top) / cellH) + 1)
              )
              const button = event.deltaY < 0 ? 64 : 65
              const ticks = Math.min(Math.abs(Math.round(event.deltaY / 33)), 5)
              for (let i = 0; i < ticks; i++) {
                ws.send(encoder.encode(`\x1b[<${button};${col};${row}M`))
              }
            }
          }

          return true // suppress default arrow-key conversion
        })
      }

      // Auto-launch on page load
      launch()
    </script>
  </body>
</html>
